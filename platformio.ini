[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_protocol = espota
upload_port = robocar.local
build_unflags =
	-std=gnu++11
build_flags =
	-std=gnu++17
	-D 'BUILD_ENV="$PIOENV"'
	-D MONITOR_SPEED=115200
lib_deps =
	dfrobot/DFRobot_BMM150@^1.0.0
	esp32async/ESPAsyncWebServer@^3.9.3
	bblanchon/ArduinoJson@^7.4.2
	robtillaart/INA226@^0.6.6
